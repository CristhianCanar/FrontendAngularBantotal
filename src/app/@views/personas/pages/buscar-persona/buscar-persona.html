<div class="container mt-5">
  <h3 class="mb-4">Buscar Persona por ID</h3>

  <app-search-form [title]="'Buscar por ID Persona'" (search)="onSearch($event)"></app-search-form>

  <div class="row justify-content-center mt-4">
    @if (cargando()) {
      <app-loading-spinner></app-loading-spinner>
    }
    @if (error()) {
      <app-error-alert [message]="error()"> </app-error-alert>
    }
    @if (persona() && persona()?.documento !== '') {
      <app-profile-card [persona]="persona()"> </app-profile-card>
    }
    @if (!cargando() && persona()?.documento === '') {
      <app-empty-state message="Persona no encontrada"> </app-empty-state>
    }
  </div>
</div>
